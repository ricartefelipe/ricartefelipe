name: Sync main with develop

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: sync-main-with-develop
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Advance main to match develop
        run: |
          set -euo pipefail
          git fetch origin main develop
          git checkout main
          git reset --hard origin/develop
          git push origin main --force-with-lease
